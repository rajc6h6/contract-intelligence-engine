name: Contract Intelligence Engine — Eval CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Rust clause hasher build & test ─────────────────────────────────
  rust-hasher:
    name: Rust Clause Hasher
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tools/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('tools/Cargo.toml') }}

      - name: Build clause_hasher
        working-directory: tools
        run: cargo build --release

      - name: Run Rust unit tests
        working-directory: tools
        run: cargo test --release

      - name: Smoke test stdin pipe
        working-directory: tools
        run: |
          echo "This Agreement shall not limit liability in any way." | ./target/release/clause_hasher
          HASH=$(echo "test clause" | ./target/release/clause_hasher)
          [ ${#HASH} -eq 64 ] && echo "✓ Hash length correct (64 hex chars)" || exit 1

  # ── Job 2: Backend Python lint + type-check ────────────────────────────────
  backend-lint:
    name: Backend Lint & Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Ruff lint
        working-directory: backend
        run: ruff check app/ mcp_server/

      - name: Ruff format check
        working-directory: backend
        run: ruff format --check app/ mcp_server/

  # ── Job 3: Deterministic evals (no external API needed) ───────────────────
  deterministic-evals:
    name: Deterministic Evaluations
    runs-on: ubuntu-latest
    needs: [backend-lint]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: cie_user
          POSTGRES_PASSWORD: cie_password
          POSTGRES_DB: contract_intelligence
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[evals]"

      - name: Run deterministic assertions on mock reports
        env:
          DATABASE_URL: postgresql://cie_user:cie_password@localhost:5432/contract_intelligence
        run: |
          # Use pre-computed mock reports if they exist; otherwise skip live eval
          if [ -f evals/collected_reports.json ]; then
            python evals/eval_deterministic.py evals/collected_reports.json
          else
            echo "No pre-computed reports found — skipping deterministic eval in CI"
            echo "Run python evals/run_evals.py locally to generate reports"
          fi

  # ── Job 4: LLM-as-judge eval (requires GEMINI_API_KEY secret) ─────────────
  llm-judge-evals:
    name: LLM-as-Judge Hallucination Gate
    runs-on: ubuntu-latest
    needs: [deterministic-evals]
    # Only run on PRs to main that have pre-computed reports committed
    if: github.event_name == 'pull_request' && hashFiles('evals/collected_reports.json') != ''
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install eval dependencies
        working-directory: backend
        run: pip install -e ".[evals]"

      - name: Run LLM judge on pre-computed reports
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python evals/eval_llm_judge.py evals/collected_reports.json --sample 15

      - name: Enforce hallucination rate gate
        run: |
          python -c "
          import json, sys
          if not __import__('pathlib').Path('evals/results.json').exists():
            print('No results.json found — skipping gate check')
            sys.exit(0)
          r = json.load(open('evals/results.json'))
          rate = r.get('hallucination_rate', 0)
          print(f'Hallucination rate: {rate:.1%} (threshold: 5%)')
          if rate >= 0.05:
            print(f'BLOCKING MERGE: hallucination rate {rate:.1%} exceeds 5% threshold')
            sys.exit(1)
          print('Gate passed')
          "

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results-${{ github.sha }}
          path: evals/results.json
          retention-days: 30

  # ── Job 5: Frontend build check ───────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run type-check

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
        run: npm run build
